<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mon profil FRD</title><link rel="stylesheet" href="style.css"></head><body><main class="page"><div class="page-heading"><div><p class="eyebrow"><span></span>Espace pilote</p><h1>Mon <em class="accent">profil</em></h1><p>Ta fiche pilote et ton setup actuel.</p></div><a class="btn secondary" href="pilotes.html">Voir le paddock</a></div><div id="status" class="status" hidden></div><div class="profile-layout"><aside class="panel avatar-panel"><img id="avatarPreview" class="avatar-preview" src="assets/logo-frd.jpeg" alt="Photo du pilote"><div><strong>Photo de profil</strong><p class="tagline">JPG, PNG ou WEBP • 3 Mo max</p><button id="deletePhoto" class="btn small danger" type="button">Supprimer la photo</button></div></aside><section class="panel"><form id="profileForm" class="form"><div class="form-row"><div class="field"><label for="prenom">Prénom</label><input id="prenom" name="prenom" required maxlength="60"></div><div class="field"><label for="nom">Nom</label><input id="nom" name="nom" required maxlength="60"></div></div><div class="field"><label for="pseudo">Pseudo pilote</label><input id="pseudo" name="pseudo" maxlength="60"></div><div class="form-row"><div class="field"><label for="photo">Photo pilote</label><input id="photo" name="photo" type="file" accept="image/jpeg,image/png,image/webp"></div><div class="field"><label for="photo_carrosserie">Photo carrosserie</label><input id="photo_carrosserie" name="photo_carrosserie" type="file" accept="image/jpeg,image/png,image/webp"></div><div class="field"><label for="photo_chassis">Photo châssis</label><input id="photo_chassis" name="photo_chassis" type="file" accept="image/jpeg,image/png,image/webp"></div></div><div class="form-row"><div class="field"><label for="chassis">Châssis RC</label><input id="chassis" name="chassis" maxlength="100"></div><div class="field"><label for="moteur">Moteur</label><input id="moteur" name="moteur" maxlength="100"></div><div class="field"><label for="esc">ESC</label><input id="esc" name="esc" maxlength="100"></div><div class="field"><label for="servo">Servo</label><input id="servo" name="servo" maxlength="100"></div><div class="field"><label for="gyro">Gyro</label><input id="gyro" name="gyro" maxlength="100"></div><div class="field"><label for="radio">Radio</label><input id="radio" name="radio" maxlength="100"></div><div class="field"><label for="batterie">Batterie</label><input id="batterie" name="batterie" maxlength="100"></div><div class="field"><label for="pneus">Pneus</label><input id="pneus" name="pneus" maxlength="100"></div><div class="field"><label for="carrosserie">Carrosserie</label><input id="carrosserie" name="carrosserie" maxlength="100"></div><div class="field"><label for="date_debut_rc_drift">Depuis quand pratiques-tu le RC Drift ?</label><input id="date_debut_rc_drift" name="date_debut_rc_drift" type="date"><small>Expérience calculée : <strong id="experiencePreview">—</strong></small></div></div><div class="field"><label for="style_pilotage">Style de pilotage</label><textarea id="style_pilotage" name="style_pilotage" rows="3" maxlength="500"></textarea></div><div class="field"><label for="objectifs">Objectifs</label><textarea id="objectifs" name="objectifs" rows="3" maxlength="500"></textarea></div><label class="check"><input id="gz_requested" name="gz_requested" type="checkbox"><span>Je demande la validation <strong>GZ Approved</strong>. Un administrateur FRD doit valider le badge.</span></label><button class="btn" type="submit">Enregistrer mon profil</button></form><hr style="border-color:#333;margin:26px 0"><button id="deleteAccount" class="btn danger" type="button">Supprimer définitivement mon compte</button></section></div></main><script type="module" src="js/profil.js"></script></body></html>
