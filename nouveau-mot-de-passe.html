<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nouveau mot de passe</title><link rel="stylesheet" href="style.css"></head><body><main class="auth-shell"><section class="panel"><h1>Nouveau mot de passe</h1><p>Choisis un nouveau mot de passe sécurisé.</p><div id="status" class="status" hidden></div><form id="passwordForm" class="form"><div class="field"><label for="password">Nouveau mot de passe</label><input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required disabled></div><div class="field"><label for="confirmPassword">Confirmer le mot de passe</label><input id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required disabled></div><button class="btn" type="submit" disabled>Mettre à jour</button></form><p class="helper">Lien expiré ? <a href="mot-de-passe-oublie.html">Demander un nouvel email</a></p></section></main><script type="module" src="js/auth.js"></script></body></html>
