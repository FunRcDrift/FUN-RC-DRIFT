<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Espace pilote FRD</title><link rel="stylesheet" href="style.css"></head><body>
<main class="page"><section id="loginView" class="auth-shell"><div class="panel"><p class="eyebrow"><span></span>Espace pilote</p><h1>Connexion</h1><p>Connecte-toi pour créer ou modifier ta carte pilote.</p><div id="loginStatus" class="status" hidden></div><form id="inlineLoginForm" class="form"><div class="field"><label>Email</label><input name="email" type="email" autocomplete="email" required></div><div class="field"><label>Mot de passe</label><input name="password" type="password" autocomplete="current-password" required></div><button class="btn" type="submit">Se connecter</button></form><p class="helper"><a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a><br><br>Pas encore de compte ? <a href="inscription.html">S’inscrire</a></p></div></section>
<section id="profileView" hidden><div class="page-heading"><div><p class="eyebrow"><span></span>Espace pilote</p><h1>Mon <em class="accent">profil</em></h1><p>Connexion active. Complète ta fiche puis enregistre-la.</p></div><div><a class="btn secondary" href="pilotes.html">Voir le paddock</a> <button id="inlineLogout" class="btn danger" type="button">Déconnexion</button></div></div><div id="profileStatus" class="status" hidden></div><div class="profile-layout"><aside class="panel avatar-panel"><img id="avatarPreview" class="avatar-preview" src="assets/logo-frd.jpeg" alt="Photo du pilote"><div><strong>Photo de profil</strong><p class="tagline">JPG, PNG ou WEBP • 3 Mo max</p></div></aside><section class="panel"><form id="inlineProfileForm" class="form">
<div class="form-row"><div class="field"><label>Prénom</label><input name="prenom" required maxlength="60"></div><div class="field"><label>Nom</label><input name="nom" required maxlength="60"></div></div><div class="field"><label>Pseudo pilote</label><input name="pseudo" maxlength="60"></div><div class="form-row"><div class="field"><label>Photo pilote</label><input name="photo" type="file" accept="image/*"></div><div class="field"><label>Photo carrosserie</label><input name="photo_carrosserie" type="file" accept="image/*"></div><div class="field"><label>Photo châssis</label><input name="photo_chassis" type="file" accept="image/*"></div></div>
<div class="form-row"><div class="field"><label>Châssis RC</label><input name="chassis"></div><div class="field"><label>Moteur</label><input name="moteur"></div><div class="field"><label>ESC</label><input name="esc"></div><div class="field"><label>Servo</label><input name="servo"></div><div class="field"><label>Gyro</label><input name="gyro"></div><div class="field"><label>Radio</label><input name="radio"></div><div class="field"><label>Batterie</label><input name="batterie"></div><div class="field"><label>Pneus</label><input name="pneus"></div><div class="field"><label>Carrosserie</label><input name="carrosserie"></div><div class="field"><label>Depuis quand pratiques-tu le RC Drift ?</label><input name="date_debut_rc_drift" type="date"><small>Expérience : <strong id="experiencePreview">—</strong></small></div></div><div class="field"><label>Style de pilotage</label><textarea name="style_pilotage" rows="3"></textarea></div><div class="field"><label>Objectifs</label><textarea name="objectifs" rows="3"></textarea></div><label class="check"><input name="gz_requested" type="checkbox"><span>Je demande la validation <strong>GZ Approved</strong>.</span></label><button class="btn" type="submit">Enregistrer mon profil</button></form></section></div></section></main><script type="module" src="js/espace.js?v=20260708a"></script></body></html>
