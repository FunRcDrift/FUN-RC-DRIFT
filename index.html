<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Retrouvez tous les liens de FRD Fun RC Drift.">
  <title>FRD Fun RC Drift</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="speed-lines" aria-hidden="true"></div>
  <main class="profile-card">
    <header class="hero">
      <div class="logo-wrap">
        <span class="logo-ring" aria-hidden="true"></span>
        <img src="assets/logo-frd.jpeg" alt="Logo FRD Fun RC Drift" class="logo">
      </div>
      <p class="eyebrow"><span></span> Bienvenue dans la zone</p>
      <h1>FRD <em>Fun RC Drift</em></h1>
      <p class="tagline">Association RC Drift</p>
    </header>

    <nav class="links" aria-label="Liens de l'association">
      <a class="link-card facebook" href="https://www.facebook.com/share/1Ed5WMUocm/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M14 8h3V4h-3c-3.3 0-5 2-5 5v2H6v4h3v7h4v-7h3.5l.5-4h-4V9c0-.7.3-1 1-1Z"/></svg>
        </span>
        <span class="link-copy"><strong>Facebook</strong><small>Suivre notre actualité</small></span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a class="link-card discord" href="https://discord.gg/4Vz9A2p7w" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M19.5 5.3A17 17 0 0 0 15.4 4l-.5 1a15 15 0 0 0-5.8 0l-.5-1a17 17 0 0 0-4.1 1.3C1.9 9.2 1.2 13 1.5 16.8a17 17 0 0 0 5.1 2.6l1.2-1.7-1.9-.9.5-.4c3.6 1.7 7.6 1.7 11.2 0l.5.4-1.9.9 1.2 1.7a17 17 0 0 0 5.1-2.6c.4-4.4-.8-8.2-3-11.5ZM8.5 14.7c-1 0-1.9-1-1.9-2.2s.8-2.2 1.9-2.2 1.9 1 1.9 2.2-.9 2.2-1.9 2.2Zm7 0c-1 0-1.9-1-1.9-2.2s.8-2.2 1.9-2.2 1.9 1 1.9 2.2-.9 2.2-1.9 2.2Z"/></svg>
        </span>
        <span class="link-copy"><strong>Discord</strong><small>Rejoindre la communauté</small></span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <button class="link-card contact" type="button" id="contactButton">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2V6c0-1.1-.9-2-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"/></svg>
        </span>
        <span class="link-copy"><strong>Contact / Infos</strong><small>Bientôt disponible</small></span>
        <span class="arrow" aria-hidden="true">→</span>
      </button>
    </nav>

    <footer>
      <span class="flag"></span>
      <p>DRIFT • SHARE • REPEAT</p>
      <span class="flag reverse"></span>
    </footer>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Contact bientôt disponible</div>
  <script src="script.js"></script>
</body>
</html>
