<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inscription FRD</title><link rel="stylesheet" href="style.css"></head><body><main class="auth-shell"><section class="panel"><p class="eyebrow"><span></span>Rejoins la grille</p><h1>Inscription</h1><p>Crée ton compte pilote sécurisé.</p><div id="status" class="status" hidden></div><form id="signupForm" class="form"><div class="form-row"><div class="field"><label for="prenom">Prénom</label><input id="prenom" name="prenom" autocomplete="given-name" required maxlength="60"></div><div class="field"><label for="nom">Nom</label><input id="nom" name="nom" autocomplete="family-name" required maxlength="60"></div></div><div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required></div><div class="field"><label for="password">Mot de passe</label><input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required><small>8 caractères minimum. Le mot de passe est géré et hashé par Supabase.</small></div><button class="btn" type="submit">Créer mon compte</button></form><p class="helper">Déjà inscrit ? <a href="connexion.html">Se connecter</a></p></section></main><script type="module" src="js/auth.js"></script></body></html>
